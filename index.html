<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess.com game downloader</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #18181b;
    --surface2: #222226;
    --border: #2e2e34;
    --border2: #3e3e46;
    --text: #f0eff0;
    --muted: #8b8b97;
    --accent: #7c6fe0;
    --accent-hover: #9b90f0;
    --accent-text: #e8e5ff;
    --success: #4caf85;
    --danger: #e05c5c;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px 80px;
  }

  .board-strip {
    display: flex;
    gap: 0;
    margin-bottom: 36px;
    opacity: 0.18;
  }
  .sq {
    width: 18px;
    height: 18px;
  }
  .sq.dark { background: var(--accent); }
  .sq.light { background: transparent; }

  header { text-align: center; margin-bottom: 40px; }
  header h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  header p {
    color: var(--muted);
    font-size: 14px;
    margin-top: 6px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input[type=text], select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--muted); }

  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; }

  button {
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 18px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    white-space: nowrap;
  }
  button:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button.secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  button.secondary:hover { border-color: var(--border2); background: var(--border); }

  .filters { display: flex; gap: 8px; margin-bottom: 16px; }
  .filters select { flex: 1; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
  .stat {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    border: 1px solid var(--border);
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-val { font-size: 22px; font-weight: 600; margin-top: 2px; }

  .month-list {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 20px;
    max-height: 280px;
    overflow-y: auto;
  }
  .month-list::-webkit-scrollbar { width: 6px; }
  .month-list::-webkit-scrollbar-track { background: var(--surface2); }
  .month-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .sel-all {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
  }
  .month-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .month-row:last-child { border-bottom: none; }
  .month-row:hover { background: var(--surface2); }
  .month-row input[type=checkbox], .sel-all input[type=checkbox] {
    width: 15px; height: 15px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }
  .month-label { flex: 1; }
  .month-count { font-size: 12px; color: var(--muted); }

  .dl-row { display: flex; gap: 8px; }
  .dl-row button { flex: 1; padding: 11px; font-size: 15px; }

  .progress {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 14px;
    display: none;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .status {
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
    min-height: 18px;
  }
  .status.err { color: var(--danger); }
  .status.ok { color: var(--success); }

  .hidden { display: none !important; }

  footer {
    margin-top: 48px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="board-strip" aria-hidden="true" id="board-strip"></div>

<header>
  <h1>Chess.com game downloader</h1>
  <p>Download your full game archive for analysis</p>
</header>

<div class="card">
  <div class="card-title">Player</div>
  <div class="input-row">
    <input type="text" id="username" placeholder="Chess.com username" autocomplete="off" />
    <button onclick="loadArchives()">Load</button>
  </div>
  <div class="status err" id="load-err"></div>
</div>

<div class="card hidden" id="main-card">
  <div class="card-title">Archives</div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Months</div><div class="stat-val" id="s-months">–</div></div>
    <div class="stat"><div class="stat-label">Selected</div><div class="stat-val" id="s-sel">0</div></div>
    <div class="stat"><div class="stat-label">Games</div><div class="stat-val" id="s-games">–</div></div>
  </div>

  <div class="filters">
    <select id="year-filter" onchange="applyFilter()">
      <option value="all">All years</option>
    </select>
    <select id="format">
      <option value="pgn">PGN — analysis tools</option>
      <option value="json">JSON — raw metadata</option>
      <option value="both">Both</option>
    </select>
  </div>

  <div class="month-list" id="month-list"></div>

  <div class="dl-row">
    <button id="dl-btn" onclick="downloadGames()" disabled>↓ Download selected</button>
  </div>
  <div class="progress" id="progress"><div class="progress-fill" id="prog-fill"></div></div>
  <div class="status" id="status"></div>
</div>

<footer>
  Uses the <a href="https://www.chess.com/news/view/published-data-api" target="_blank">Chess.com public API</a> — no login required.
</footer>

<script>
// Draw checkerboard strip
const strip = document.getElementById('board-strip');
for (let i = 0; i < 32; i++) {
  const sq = document.createElement('div');
  sq.className = 'sq ' + (i % 2 === 0 ? 'dark' : 'light');
  strip.appendChild(sq);
}

let allArchives = [];
let filtered = [];
let monthGameCounts = {};

function archiveYear(url) { return url.split('/').slice(-2)[0]; }
function archiveMonth(url) { const p = url.split('/'); return { y: +p[p.length-2], m: +p[p.length-1] }; }
function archiveLabel(url) {
  const { y, m } = archiveMonth(url);
  return new Date(y, m - 1, 1).toLocaleString('en-US', { month: 'long', year: 'numeric' });
}

async function loadArchives() {
  const username = document.getElementById('username').value.trim();
  if (!username) return;
  const errEl = document.getElementById('load-err');
  errEl.textContent = 'Loading…';
  errEl.className = 'status';
  document.getElementById('main-card').classList.add('hidden');
  allArchives = [];
  monthGameCounts = {};

  try {
    const res = await fetch(`https://api.chess.com/pub/player/${encodeURIComponent(username)}/games/archives`);
    if (res.status === 404) throw new Error(`Player "${username}" not found`);
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const data = await res.json();
    allArchives = data.archives || [];
    if (!allArchives.length) { errEl.textContent = 'No games found for this player.'; return; }

    const years = [...new Set(allArchives.map(archiveYear))].sort().reverse();
    const sel = document.getElementById('year-filter');
    sel.innerHTML = '<option value="all">All years</option>';
    years.forEach(y => sel.innerHTML += `<option value="${y}">${y}</option>`);

    document.getElementById('s-months').textContent = allArchives.length;
    applyFilter();
    document.getElementById('main-card').classList.remove('hidden');
    errEl.textContent = '';

    // Count games for recent months in background
    countRecentMonths(allArchives.slice(-6));
  } catch(e) {
    errEl.textContent = e.message || 'Failed to load. Check username and try again.';
    errEl.className = 'status err';
  }
}

async function countRecentMonths(urls) {
  for (const url of urls) {
    try {
      const r = await fetch(url);
      const d = await r.json();
      monthGameCounts[url] = (d.games || []).length;
      renderList(); // refresh counts as they come in
    } catch {}
  }
}

function applyFilter() {
  const yr = document.getElementById('year-filter').value;
  filtered = yr === 'all' ? [...allArchives] : allArchives.filter(u => archiveYear(u) === yr);
  renderList();
}

function renderList() {
  const list = document.getElementById('month-list');
  let html = `<div class="sel-all"><input type="checkbox" id="sel-all" onchange="toggleAll(this)"><label for="sel-all">Select all (${filtered.length} months)</label></div>`;
  [...filtered].reverse().forEach((url, i) => {
    const count = monthGameCounts[url] != null ? `${monthGameCounts[url]} games` : '';
    html += `<div class="month-row" onclick="toggleCheck(${i})">
      <input type="checkbox" id="m${i}" data-url="${url}" onchange="updateCount()" onclick="event.stopPropagation()">
      <span class="month-label">${archiveLabel(url)}</span>
      <span class="month-count">${count}</span>
    </div>`;
  });
  list.innerHTML = html;
  updateCount();
}

function toggleCheck(i) {
  const cb = document.getElementById('m' + i);
  cb.checked = !cb.checked;
  updateCount();
}

function toggleAll(cb) {
  document.querySelectorAll('#month-list input[data-url]').forEach(el => el.checked = cb.checked);
  updateCount();
}

function updateCount() {
  const checked = [...document.querySelectorAll('#month-list input[data-url]:checked')];
  document.getElementById('s-sel').textContent = checked.length;
  document.getElementById('dl-btn').disabled = checked.length === 0;
  const totalKnown = checked.reduce((sum, el) => sum + (monthGameCounts[el.dataset.url] || 0), 0);
  const unknown = checked.filter(el => monthGameCounts[el.dataset.url] == null).length;
  document.getElementById('s-games').textContent = totalKnown > 0
    ? (unknown > 0 ? `${totalKnown}+` : totalKnown.toString())
    : (checked.length > 0 ? '...' : '–');
  const all = document.querySelectorAll('#month-list input[data-url]');
  const sa = document.getElementById('sel-all');
  if (sa) sa.checked = checked.length === all.length && all.length > 0;
}

function saveFile(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: filename });
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

async function downloadGames() {
  const urls = [...document.querySelectorAll('#month-list input[data-url]:checked')].map(el => el.dataset.url);
  if (!urls.length) return;

  const format = document.getElementById('format').value;
  const username = document.getElementById('username').value.trim();
  const btn = document.getElementById('dl-btn');
  const statusEl = document.getElementById('status');
  const prog = document.getElementById('progress');
  const fill = document.getElementById('prog-fill');

  btn.disabled = true;
  prog.style.display = 'block';
  fill.style.width = '0%';
  statusEl.className = 'status';

  let allGames = [];
  let errors = 0;

  for (let i = 0; i < urls.length; i++) {
    statusEl.textContent = `Fetching ${archiveLabel(urls[i])}… (${i + 1} / ${urls.length})`;
    fill.style.width = Math.round((i / urls.length) * 92) + '%';
    try {
      const r = await fetch(urls[i]);
      if (!r.ok) throw new Error();
      const d = await r.json();
      allGames.push(...(d.games || []));
      monthGameCounts[urls[i]] = (d.games || []).length;
    } catch {
      errors++;
    }
  }

  fill.style.width = '100%';

  if (!allGames.length) {
    statusEl.textContent = 'No games could be fetched.';
    statusEl.className = 'status err';
    btn.disabled = false;
    prog.style.display = 'none';
    return;
  }

  const ts = new Date().toISOString().slice(0,10);

  if (format === 'pgn' || format === 'both') {
    const pgns = allGames.map(g => g.pgn).filter(Boolean).join('\n\n');
    saveFile(pgns, `${username}_games_${ts}.pgn`, 'application/x-chess-pgn');
  }
  if (format === 'json' || format === 'both') {
    const payload = JSON.stringify({ username, exported_at: new Date().toISOString(), total: allGames.length, games: allGames }, null, 2);
    saveFile(payload, `${username}_games_${ts}.json`, 'application/json');
  }

  const errNote = errors > 0 ? ` (${errors} month${errors>1?'s':''} failed)` : '';
  statusEl.textContent = `Downloaded ${allGames.length} games from ${urls.length} month${urls.length>1?'s':''}${errNote}.`;
  statusEl.className = 'status ok';
  prog.style.display = 'none';
  btn.disabled = false;
  renderList();
}

document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadArchives();
});
</script>
</body>
</html>
